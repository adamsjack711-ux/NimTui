name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: nimble test -y
      - name: Build demo
        run: nim c -d:release --hints:off examples/dashboard.nim
      - name: Smoke-run the shipped npm binary for this platform
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) bin=npm/dist/linux-x64/nimtui ;;
            Linux-aarch64) bin=npm/dist/linux-arm64/nimtui ;;
            Darwin-arm64) bin=npm/dist/darwin-arm64/nimtui ;;
            Darwin-x86_64) bin=npm/dist/darwin-x64/nimtui ;;
            *) echo "no shipped binary for this runner"; exit 0 ;;
          esac
          chmod +x "$bin"
          # --selftest renders one frame and exits (no tty, no hanging loop)
          "$bin" --selftest > /tmp/smoke.out
          grep -q "loom dashboard" /tmp/smoke.out
          echo "shipped $bin runs"
